      - application/json
      description: Validates an existing refresh token, revokes it, and issues a new
        access/refresh token pair
      parameters:
      - description: Refresh token request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/handlers.refreshRequest'
      produces:
