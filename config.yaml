environment: local
port: 8080
database:
  host: localhost
  port: 5432
  user: postgres
  password: postgres
  dbname: dermify
  sslmode: disable
auth:
  jwt_secret: "change-me-in-production"
  access_token_expiry: 15m
  refresh_token_expiry: 168h
storage:
  base_path: "./data/photos"
smtp:
  # Gmail / Google Workspace SMTP relay.
  # Requires an App Password (https://myaccount.google.com/apppasswords) — regular
  # account passwords will be rejected even with 2FA disabled.
  host: "smtp.gmail.com"
  port: 587
  username: "darius@liutkus.lt"
  # NEVER commit the real password here — config.yaml is tracked by git.
  # Provide it at runtime via the env var:  OVERRIDE_SMTP_PASSWORD=xxxx xxxx xxxx xxxx
  password: ""
  # Gmail enforces that the envelope sender matches the authenticated user
  # (or a configured "Send mail as" alias), so keep from_email aligned with `username`.
  from_email: "darius@liutkus.lt"
  from_name: "Dermify"
  frontend_url: "http://localhost:5173"
cors:
  allowed_origins:
    - "http://localhost:3000"
    - "http://localhost:3001"
    - "http://localhost:5173"
    - "http://127.0.0.1:3000"
    - "http://127.0.0.1:3001"
    - "http://127.0.0.1:5173"
  allowed_methods:
    - "GET"
    - "POST"
    - "PUT"
    - "DELETE"
    - "OPTIONS"
    - "PATCH"
  allowed_headers:
    - "Accept"
    - "Authorization"
    - "Content-Type"
    - "X-CSRF-Token"
    - "X-Requested-With"