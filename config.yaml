environment: local
port: 8080
database:
  host: localhost
  port: 5432
  user: postgres
  password: postgres
  dbname: dermify
  sslmode: disable
auth:
  jwt_secret: "change-me-in-production"
  access_token_expiry: 15m
  refresh_token_expiry: 168h
storage:
  base_path: "./data/photos"
smtp:
  host: ""
  port: 587
  username: ""
  password: ""
  from_email: "noreply@dermify.com"
  from_name: "Dermify"
  frontend_url: "http://localhost:5173"
cors:
  allowed_origins:
    - "http://localhost:3000"
    - "http://localhost:3001"
    - "http://localhost:5173"
    - "http://127.0.0.1:3000"
    - "http://127.0.0.1:3001"
    - "http://127.0.0.1:5173"
  allowed_methods:
    - "GET"
    - "POST"
    - "PUT"
    - "DELETE"
    - "OPTIONS"
    - "PATCH"
  allowed_headers:
    - "Accept"
    - "Authorization"
    - "Content-Type"
    - "X-CSRF-Token"
    - "X-Requested-With"